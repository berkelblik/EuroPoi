<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="theme-color" content="#020a1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EuroPoi" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/EuroPoiLogo.png" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/EuroPoiLogo.png" />
    <title>EuroPoi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('%PUBLIC_URL%/service-worker.js')
            .then((reg) => {
              // Heractiveer bestaande sessie als de app al open staat
              if (reg.waiting) reg.waiting.postMessage("SKIP_WAITING");
              reg.addEventListener("updatefound", () => {
                const newWorker = reg.installing;
                newWorker.addEventListener("statechange", () => {
                  if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                    newWorker.postMessage("SKIP_WAITING");
                  }
                });
              });
            })
            .catch((err) => console.warn("SW fout:", err));

          // Zorg dat bij heropenen van de app de bestaande sessie wordt gebruikt
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            // Alleen herladen als er al een controller was (update scenario)
            if (navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      }

      // Voorkom meerdere vensters: stuur focus naar bestaand venster
      if ('BroadcastChannel' in window) {
        const bc = new BroadcastChannel('europoi_channel');
        bc.onmessage = (e) => {
          if (e.data === 'FOCUS') window.focus();
        };
        // Stuur signaal naar eventueel al open venster
        bc.postMessage('FOCUS');
      }
    </script>
  </head>
  <body>
    <noscript>JavaScript is vereist voor EuroPoi.</noscript>
    <div id="root"></div>
  </body>
</html>
