<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EuroPoi Assistent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efe9;
      --text: #1a1a1a; --text2: #555550; --text3: #888880;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
      --brand: #0A1628; --brand2: #1E3A5F;
      --green: #1a7a4a; --amber: #b45309;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e;
        --text: #f0f0ec; --text2: #aaa9a3; --text3: #77776f;
        --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.20);
        --brand: #1E3A5F; --brand2: #2a5080;
      }
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--bg3); color: var(--text); }
    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; }
    .brand-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .brand-logo { width: 44px; height: 44px; border-radius: 12px; background: var(--brand); display: flex; align-items: center; justify-content: center; }
    .brand-logo svg { width: 24px; height: 24px; }
    .brand-name { font-size: 22px; font-weight: 500; color: var(--text); }
    .brand-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .chat-card { width: 100%; max-width: 680px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; display: flex; flex-direction: column; height: calc(100vh - 160px); min-height: 520px; max-height: 780px; }

    /* HEADER */
    .chat-header { padding: 10px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .chat-header-icon { width: 28px; height: 28px; border-radius: 7px; background: var(--brand); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-header-icon svg { width: 15px; height: 15px; }
    .chat-header-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .chat-header-sub { font-size: 11px; color: var(--text3); }
    .lang-row { margin-left: auto; display: flex; gap: 3px; }
    .lang-btn { font-size: 10px; padding: 3px 6px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; }
    .lang-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* API BALK */
    .api-balk { padding: 8px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .api-status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
    .api-status-dot.actief { background: var(--green); }
    .api-status-tekst { font-size: 11px; color: var(--text2); flex: 1; }
    .api-toggle { font-size: 11px; color: var(--brand2); cursor: pointer; text-decoration: underline; background: none; border: none; font-family: inherit; white-space: nowrap; }
    .api-toggle:hover { color: var(--text); }

    /* API PANEEL */
    .api-panel { padding: 10px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg3); flex-shrink: 0; display: none; }
    .api-panel.open { display: block; }
    .api-panel-title { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
    .api-input-row { display: flex; gap: 6px; }
    .api-input-row input { flex: 1; font-size: 12px; padding: 7px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-family: inherit; outline: none; }
    .api-input-row input:focus { border-color: var(--brand2); }
    .api-save-btn { font-size: 11px; padding: 7px 12px; border-radius: var(--radius-md); border: none; background: var(--brand); color: #fff; cursor: pointer; font-family: inherit; }
    .api-clear-btn { font-size: 11px; padding: 7px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; }
    .api-feedback { font-size: 11px; margin-top: 5px; color: var(--green); }
    .api-info { font-size: 10px; color: var(--text3); margin-top: 4px; }
    .api-info a { color: var(--brand2); }

    /* GEEN SLEUTEL MELDING */
    .geen-sleutel-msg { margin: 12px 16px; padding: 12px 14px; border-radius: var(--radius-lg); background: rgba(180,83,9,0.07); border: 0.5px solid rgba(180,83,9,0.22); font-size: 12px; color: var(--amber); line-height: 1.65; display: none; flex-shrink: 0; }
    .geen-sleutel-msg.zichtbaar { display: block; }
    .geen-sleutel-msg a { color: var(--brand2); }

    /* MESSAGES */
    .messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
    .msg { max-width: 88%; display: flex; flex-direction: column; }
    .msg.user { align-self: flex-end; }
    .msg.bot  { align-self: flex-start; }
    .bubble { padding: 9px 13px; border-radius: var(--radius-lg); font-size: 13px; line-height: 1.65; }
    .user .bubble { background: var(--brand); color: #fff; border-bottom-right-radius: 3px; }
    .bot  .bubble { background: var(--bg2); color: var(--text); border: 0.5px solid var(--border); border-bottom-left-radius: 3px; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 13px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

    /* SUGGESTIONS */
    .sugs { padding: 7px 12px; display: flex; gap: 5px; flex-wrap: wrap; border-top: 0.5px solid var(--border); background: var(--bg2); flex-shrink: 0; }
    .sug { font-size: 11px; padding: 4px 9px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; }
    .sug:hover { background: var(--bg3); color: var(--text); }
    .sug:disabled { opacity: 0.4; cursor: not-allowed; }

    /* INPUT */
    .input-row { display: flex; gap: 8px; padding: 10px 14px; border-top: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .input-row textarea { flex: 1; font-size: 13px; padding: 8px 11px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); resize: none; height: 38px; font-family: inherit; line-height: 1.5; outline: none; }
    .input-row textarea:focus { border-color: var(--brand2); }
    .input-row textarea:disabled { opacity: 0.4; }
    .send-btn { width: 38px; height: 38px; border-radius: var(--radius-md); border: none; background: var(--brand); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .page-footer { margin-top: 14px; font-size: 11px; color: var(--text3); text-align: center; }
    .page-footer a { color: var(--text2); text-decoration: none; }
    @media (max-width: 480px) {
      .page { padding: 10px 8px 20px; }
      .brand-header { margin-bottom: 10px; }
      .chat-card { height: calc(100vh - 110px); border-radius: var(--radius-lg); }
    }
  </style>
</head>

KENNISBANK EUROPOI:

APP & TOEGANG:
- Live op https://app.europoi.nl
- Werkt op telefoon, tablet en desktop via de browser
- Installeerbaar als PWA via "Toevoegen aan startscherm"
- Versie v1.0.0

CSV-BESTAND (POI-invoer):
- Scheidingsteken: puntkomma (;)
- Verplichte veldnamen (exact, kleine letters): lat;lng;pluscode;name;desc;category;radius;mp3
- Verplichte velden: pluscode en name
- Facultatief: lat, lng (worden berekend uit pluscode), desc, category, radius, mp3
- Tekstvelden met komma's: omring met dubbele aanhalingstekens: "Eisenach, Bachhaus"
- Pluscode is leidend voor locatiebepaling
- Meerdere categorieën per POI: voeg extra rijen toe met dezelfde pluscode
- Eerste categorie per POI is de primaire categorie
- Radius 0 = standaard: wandelaar 30m, fietser 100m, motorrijder 160m
- mp3: directe URL naar audiobestand (Dropbox, Google Drive)

PLUSCODE:
- Open Location Code formaat, bijv. 9F4845RW+G2
- Opzoeken via https://plus.codes
- Verplicht veld, bepaalt de locatie op de kaart
- In bestandsnaam: + vervangen door -: 9F4845RW-G2.mp3

AUDIO HIËRARCHIE:
1. mp3-URL in CSV (Dropbox/Drive)
2. Bulk audio via pluscode-bestandsnaam
3. Individueel geüpload audiobestand
4. ElevenLabs TTS (vereist API-sleutel)
5. Ingebouwde browser/apparaat TTS stem

DROPBOX LINKS:
- App converteert automatisch naar directe downloadlink

IMPORTEREN:
- Tik op IMPORT knop in de app
- Selecteer CSV-bestand
- POIs verschijnen direct op de kaart
- Duplicaten worden samengevoegd op basis van pluscode

EXPORTEREN:
- Tik op EXPORT knop (alleen zichtbaar na PIN invoer)
- Ontvangt CSV met alle huidige POIs

PIN / ADMIN MODE:
- 3x tikken op het EuroPoi-logo linksboven
- PIN invoeren (4 cijfers, uniek per gebruiker)
- Ontgrendelt: Export knop, Route-menu

ROUTE MENU (na PIN):
- GPX Route invoer: laad GPX-routebestand
- Route exporteren: exporteert POIs als GPX voor Komoot/OsmAnd
- Track opname: neemt GPS-pad op

GPX BESTANDEN:
- Route = rtept waypoints voor Komoot, OsmAnd, Garmin
- Track = trkpt punten, opgenomen rijpad
- GPX 1.1 standaard

KOPPELING ROUTE AAN POI-CATEGORIE (belangrijk):
- Wanneer je een GPX-routebestand importeert via het Route Menu, wordt de bestandsnaam van dat GPX-bestand gebruikt als routenaam
- Als de bestandsnaam van het GPX-routebestand exact overeenkomt met een categorie-naam in je POI-collectie, worden ALLE POIs uit die categorie automatisch gekoppeld aan die route
- Deze gekoppelde POIs worden getriggerd op het dichtstbijzijnde routepunt — de fysieke afstand tot de route doet er NIET toe
- Dit verklaart waarom POIs soms op meer dan 500 meter van de route toch worden geactiveerd — ze behoren tot de categorie die overeenkomt met de routenaam
- Voorbeeld: een GPX-bestand met de naam "Gelderland.gpx" triggert alle POIs met categorie "Gelderland" langs de route
- De POIs verschijnen als blauwe markers op de kaart zodra een passende route is geladen
- Dit is de primaire manier om een POI-groep te koppelen aan een specifieke route

CATEGORIEËN:
- Standaard: Horeca, Geschiedenis, Toeristisch, Cultureel, Natuur, Knooppunten, Overig
- Eigen categorieën mogelijk via CSV
- Categorie-naam = ook de koppeling met een GPX-routebestand (zie boven)

VERVOERSMODI:
- Wandelaar: standaard radius 30m
- Fietser: standaard radius 100m
- Motorrijder: standaard radius 160m

ECO MODUS:
- Groen blad icoon in werkbalk
- Scherm blijft aan, fullscreen, wake lock

SIMULATIEMODUS:
- GPS knop schakelt tussen GPS LIVE en SIM

TALEN:
- Nederlands, Engels, Duits, Frans, Spaans, Italiaans

- Premium TTS via API-sleutel in instellingen

GEDRAGSREGELS:
- Beantwoord ALLEEN vragen over het gebruik van EuroPoi
- Bij andere vragen: vriendelijk aangeven dat je alleen EuroPoi-vragen beantwoordt
- Antwoord in de taal van de gebruiker of de geselecteerde taal
- Houd antwoorden beknopt en praktisch
- Geef concrete stappen bij how-to vragen`;

  it: {

    placeholder: "Fai la tua domanda...",

    geenSleutel: "Per fare domande hai bisogno della tua chiave API Anthropic. Costa solo pochi centesimi per conversazione. Disponibile su <a href='https://console.anthropic.com' target='_blank'>console.anthropic.com</a>.",
    statusZonder: "Nessuna chiave API — domande non disponibili",

let history     = [];
let currentLang = "nl";
let busy        = false;
let apiSleutel  = localStorage.getItem(OPSLAG_API) || "";

const messagesEl  = document.getElementById("messages");
const inputEl     = document.getElementById("user-input");
const sendBtn     = document.getElementById("send-btn");
const sugsEl      = document.getElementById("sugs");
const headerSub   = document.getElementById("header-sub");
const apiDot      = document.getElementById("api-dot");
const apiStatusT  = document.getElementById("api-status-tekst");
const apiToggleB  = document.getElementById("api-toggle-btn");
const apiPanel    = document.getElementById("api-panel");
const apiKeyInput = document.getElementById("api-key-input");
const apiSaveBtn  = document.getElementById("api-save-btn");
const apiClearBtn = document.getElementById("api-clear-btn");
const apiFeedback = document.getElementById("api-feedback");
const apiInfo     = document.getElementById("api-info");
const apiPanelTit = document.getElementById("api-panel-title");
const geenMsg     = document.getElementById("geen-sleutel-msg");

function heeftSleutel() { return apiSleutel.trim().length > 10; }

function updateUI() {
  const d = LANG[currentLang];
  if (heeftSleutel()) {
    apiDot.classList.add("actief");
    apiStatusT.textContent = d.statusMet;
    apiToggleB.textContent  = d.toggleMet;
    geenMsg.classList.remove("zichtbaar");
    inputEl.disabled = false;
    inputEl.placeholder = d.placeholder;
    apiClearBtn.style.display = "inline-block";
    apiKeyInput.value = apiSleutel;
  } else {
    apiDot.classList.remove("actief");
    apiStatusT.textContent = d.statusZonder;
    apiToggleB.textContent  = d.toggleZonder;
    geenMsg.innerHTML = d.geenSleutel;
    geenMsg.classList.add("zichtbaar");
    inputEl.disabled = true;
    inputEl.placeholder = d.placeholder;
    apiClearBtn.style.display = "none";
    sendBtn.disabled = true;
  }
  apiPanelTit.textContent  = d.panelTitel;
  apiSaveBtn.textContent   = d.opslaan;
  apiClearBtn.textContent  = d.verwijder;
  apiInfo.innerHTML        = d.info;
}

function toggleApiPanel() {
  apiPanel.classList.toggle("open");
  apiFeedback.style.display = "none";
}

function slaApiOp() {
  const val = apiKeyInput.value.trim();
  if (!val || val.length < 10) return;
  apiSleutel = val;
  localStorage.setItem(OPSLAG_API, val);
  apiFeedback.textContent = LANG[currentLang].opgeslagen;
  apiFeedback.style.display = "block";
  setTimeout(() => { apiFeedback.style.display = "none"; }, 2500);
  updateUI();
}

function verwijderApi() {
  apiSleutel = "";
  localStorage.removeItem(OPSLAG_API);
  apiKeyInput.value = "";
  apiFeedback.textContent = LANG[currentLang].verwijderd;
  apiFeedback.style.display = "block";
  setTimeout(() => { apiFeedback.style.display = "none"; }, 2500);
  apiPanel.classList.remove("open");
  updateUI();
}

function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function addMsg(role, text) {
  const wrap   = document.createElement("div");
  wrap.className = "msg " + (role === "user" ? "user" : "bot");
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  if (role === "bot" && text === null) {
    bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  } else {
    bubble.textContent = text;
  }
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollBottom();
  return bubble;
}

function setLang(lang) {
  currentLang = lang;
  const d = LANG[lang];
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  headerSub.textContent = d.sub;
  renderSugs(lang);
  updateUI();
}

function renderSugs(lang) {
  sugsEl.innerHTML = "";
  LANG[lang].sugs.forEach(s => {
    const btn = document.createElement("button");
    btn.className   = "sug";
    btn.textContent = s.label;
    btn.disabled    = !heeftSleutel();
    btn.onclick     = () => { if (!busy && heeftSleutel()) sendMessage(s.q); };
    sugsEl.appendChild(btn);
  });
}

document.querySelectorAll(".lang-btn").forEach(btn => {
  btn.addEventListener("click", () => setLang(btn.dataset.lang));
});

async function sendMessage(text) {
  if (!text.trim() || busy || !heeftSleutel()) return;
  busy = true;
  sendBtn.disabled = true;
  inputEl.value = "";

  addMsg("user", text);
  history.push({ role: "user", content: text });
  const loadingBubble = addMsg("bot", null);

  try {
    const langNames = { nl:"Nederlands", en:"English", de:"Deutsch", fr:"Français", es:"Español", it:"Italiano" };
    const langNote  = `\n\n[Antwoord in het ${langNames[currentLang] || "Nederlands"}]`;
    const messages  = [...history.slice(0, -1), { role: "user", content: text + langNote }];

    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiSleutel.trim(),
        "anthropic-version": "2023-06-01"
      },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: SYSTEM, messages })
    });

    const data   = await resp.json();
    const answer = data.content?.[0]?.text || LANG[currentLang].fout || "Er ging iets mis. Probeer het opnieuw.";
    loadingBubble.innerHTML  = "";
    loadingBubble.textContent = answer;
    history.push({ role: "assistant", content: answer });
    if (history.length > 24) history = history.slice(-24);

  } catch {
    loadingBubble.innerHTML  = "";
    loadingBubble.textContent = "Verbindingsfout. Controleer je internetverbinding en probeer opnieuw.";
  }

  busy = false;
  if (heeftSleutel()) sendBtn.disabled = !inputEl.value.trim();
  scrollBottom();
}

sendBtn.addEventListener("click", () => sendMessage(inputEl.value));
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
});
inputEl.addEventListener("input", () => {
  sendBtn.disabled = !inputEl.value.trim() || busy || !heeftSleutel();
});

setLang("nl");
addMsg("bot", LANG.nl.welcome);
</script>
