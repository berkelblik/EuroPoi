<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EuroPoi Assistent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg2:       #f7f7f5;
      --bg3:       #f0efe9;
      --text:      #1a1a1a;
      --text2:     #555550;
      --text3:     #888880;
      --border:    rgba(0,0,0,0.12);
      --border2:   rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --brand:     #0A1628;
      --brand2:    #1E3A5F;
      --accent:    #ADD8E6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #1a1a1a;
        --bg2:     #242424;
        --bg3:     #2e2e2e;
        --text:    #f0f0ec;
        --text2:   #aaa9a3;
        --text3:   #77776f;
        --border:  rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.20);
        --brand:   #1E3A5F;
        --brand2:  #2a5080;
      }
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--bg3); color: var(--text); }

    /* ── PAGE LAYOUT ── */
    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; }

    .brand-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .brand-logo { width: 44px; height: 44px; border-radius: 12px; background: var(--brand); display: flex; align-items: center; justify-content: center; }
    .brand-logo svg { width: 24px; height: 24px; }
    .brand-name { font-size: 22px; font-weight: 500; color: var(--text); }
    .brand-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

    /* ── CHAT CONTAINER ── */
    .chat-card { width: 100%; max-width: 680px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; display: flex; flex-direction: column; height: calc(100vh - 160px); min-height: 480px; max-height: 740px; }

    /* ── HEADER ── */
    .chat-header { padding: 12px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .chat-header-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--brand); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-header-icon svg { width: 16px; height: 16px; }
    .chat-header-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .chat-header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .lang-row { margin-left: auto; display: flex; gap: 4px; }
    .lang-btn { font-size: 11px; padding: 3px 7px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .lang-btn:hover { border-color: var(--border2); color: var(--text); }
    .lang-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* ── MESSAGES ── */
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
    .msg { max-width: 88%; display: flex; flex-direction: column; }
    .msg.user { align-self: flex-end; }
    .msg.bot  { align-self: flex-start; }
    .bubble { padding: 10px 14px; border-radius: var(--radius-lg); font-size: 13.5px; line-height: 1.65; }
    .user .bubble { background: var(--brand); color: #fff; border-bottom-right-radius: 3px; }
    .bot  .bubble { background: var(--bg2); color: var(--text); border: 0.5px solid var(--border); border-bottom-left-radius: 3px; }
    .bot  .bubble.loading { color: var(--text3); font-style: italic; }
    .bubble a { color: #4a9edd; }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

    /* ── SUGGESTIONS ── */
    .sugs { padding: 8px 12px; display: flex; gap: 6px; flex-wrap: wrap; border-top: 0.5px solid var(--border); background: var(--bg2); flex-shrink: 0; }
    .sug { font-size: 11px; padding: 5px 10px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit; }
    .sug:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }

    /* ── INPUT ROW ── */
    .input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .input-row textarea { flex: 1; font-size: 13.5px; padding: 8px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); resize: none; height: 40px; font-family: inherit; line-height: 1.5; outline: none; transition: border-color 0.15s; }
    .input-row textarea:focus { border-color: var(--brand2); }
    .send-btn { width: 40px; height: 40px; border-radius: var(--radius-md); border: none; background: var(--brand); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── FOOTER ── */
    .page-footer { margin-top: 16px; font-size: 11px; color: var(--text3); text-align: center; }
    .page-footer a { color: var(--text2); text-decoration: none; }
    .page-footer a:hover { color: var(--text); }

    @media (max-width: 480px) {
      .page { padding: 12px 8px 24px; }
      .brand-header { margin-bottom: 12px; }
      .chat-card { height: calc(100vh - 120px); border-radius: var(--radius-lg); }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="brand-header">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ADD8E6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">EuroPoi</div>
      <div class="brand-sub">Gebruikersassistent</div>
    </div>
  </div>

  <div class="chat-card">

    <div class="chat-header">
      <div class="chat-header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ADD8E6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div>
        <div class="chat-header-title">EuroPoi Assistent</div>
        <div class="chat-header-sub" id="header-sub">Stel je vraag over het gebruik van EuroPoi</div>
      </div>
      <div class="lang-row">
        <button class="lang-btn active" data-lang="nl">NL</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="it">IT</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="sugs" id="sugs"></div>

    <div class="input-row">
      <textarea id="user-input" placeholder="Stel je vraag..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>

  <div class="page-footer">
    <a href="https://app.europoi.nl" target="_blank">app.europoi.nl</a>
    &nbsp;&middot;&nbsp;
    Aangedreven door Claude AI
  </div>

</div>

<script>
const SYSTEM = `Je bent de officiële EuroPoi assistent. EuroPoi is een Progressive Web App (PWA) voor buitensporters (fietsers, wandelaars, motorrijders) die audiocommentaar geeft bij het passeren van Points of Interest (POIs).

KENNISBANK EUROPOI:

APP & TOEGANG:
- Live op https://app.europoi.nl
- Werkt op telefoon, tablet en desktop via de browser
- Installeerbaar als PWA via "Toevoegen aan startscherm"
- Versie v1.0.0

CSV-BESTAND (POI-invoer):
- Scheidingsteken: puntkomma (;)
- Verplichte veldnamen (exact, kleine letters): lat;lng;pluscode;name;desc;category;radius;mp3
- Verplichte velden: pluscode en name
- Facultatief: lat, lng (worden berekend uit pluscode), desc, category, radius, mp3
- Tekstvelden met komma's: omring met dubbele aanhalingstekens: "Eisenach, Bachhaus"
- Pluscode is leidend voor locatiebepaling
- Meerdere categorieën per POI: voeg extra rijen toe met dezelfde pluscode
- Eerste categorie per POI is de primaire categorie
- Radius 0 = standaard: wandelaar 30m, fietser 100m, motorrijder 160m
- mp3: directe URL naar audiobestand (Dropbox, Google Drive)

PLUSCODE:
- Open Location Code formaat, bijv. 9F4845RW+G2
- Opzoeken via https://plus.codes
- Verplicht veld, bepaalt de locatie op de kaart
- In bestandsnaam: + vervangen door -: 9F4845RW-G2.mp3

AUDIO HIËRARCHIE:
1. mp3-URL in CSV (Dropbox/Drive)
2. Bulk audio via pluscode-bestandsnaam
3. Individueel geüpload audiobestand
4. ElevenLabs TTS (vereist API-sleutel)
5. Ingebouwde browser/apparaat TTS stem

DROPBOX LINKS:
- App converteert automatisch naar directe downloadlink
- Geen handmatige aanpassing nodig

IMPORTEREN:
- Tik op IMPORT knop in de app
- Selecteer CSV-bestand
- POIs verschijnen direct op de kaart
- Duplicaten worden samengevoegd op basis van pluscode

EXPORTEREN:
- Tik op EXPORT knop (alleen zichtbaar na PIN invoer)
- Ontvangt CSV met alle huidige POIs

PIN / ADMIN MODE:
- 3x tikken op het EuroPoi-logo linksboven
- PIN invoeren (4 cijfers, uniek per gebruiker)
- Ontgrendelt: Export knop, Route-menu

ROUTE MENU (na PIN):
- GPX Route invoer: laad GPX-routebestand
- Route exporteren: exporteert POIs als GPX voor Komoot/OsmAnd
- Track opname: neemt GPS-pad op

GPX BESTANDEN:
- Route = rtept waypoints voor Komoot, OsmAnd, Garmin
- Track = trkpt punten, opgenomen rijpad
- GPX 1.1 standaard

CATEGORIEËN:
- Standaard: Horeca, Geschiedenis, Toeristisch, Cultureel, Natuur, Knooppunten, Overig
- Eigen categorieën mogelijk via CSV
- Categorie = ook routenaam voor GPX-koppeling

VERVOERSMODI:
- Wandelaar: standaard radius 30m
- Fietser: standaard radius 100m
- Motorrijder: standaard radius 160m

ECO MODUS:
- Groen blad icoon in werkbalk
- Scherm blijft aan, fullscreen, wake lock

SIMULATIEMODUS:
- GPS knop schakelt tussen GPS LIVE en SIM
- In SIM: navigatiepad voor handmatig verplaatsen

TALEN:
- Nederlands, Engels, Duits, Frans, Spaans, Italiaans

ELEVENLABS:
- Premium TTS via API-sleutel
- Instellen via tandwiel instellingen

GEDRAGSREGELS:
- Beantwoord ALLEEN vragen over het gebruik van EuroPoi
- Bij andere vragen: vriendelijk aangeven dat je alleen EuroPoi-vragen beantwoordt
- Antwoord in de taal van de gebruiker of de geselecteerde taal
- Houd antwoorden beknopt en praktisch
- Geef concrete stappen bij how-to vragen`;

const LANG_DATA = {
  nl: {
    welcome: "Hallo! Ik ben de EuroPoi assistent. Stel me een vraag over het gebruik van de app — zoals CSV aanmaken, POIs importeren of audio instellen.",
    placeholder: "Stel je vraag...",
    sub: "Stel je vraag over het gebruik van EuroPoi",
    sugs: [
      { label: "CSV aanmaken",     q: "Hoe maak ik een CSV-bestand aan voor EuroPoi?" },
      { label: "Pluscode opzoeken",q: "Wat is een pluscode en hoe zoek ik die op?" },
      { label: "POIs importeren",  q: "Hoe importeer ik POIs in EuroPoi?" },
      { label: "Audio koppelen",   q: "Hoe koppel ik een mp3-bestand aan een POI?" },
      { label: "Route vs track",   q: "Wat is het verschil tussen een route en een track in EuroPoi?" }
    ]
  },
  en: {
    welcome: "Hello! I'm the EuroPoi assistant. Ask me anything about using the app — like creating a CSV file, importing POIs, or setting up audio.",
    placeholder: "Ask your question...",
    sub: "Ask your question about EuroPoi",
    sugs: [
      { label: "Create CSV",    q: "How do I create a CSV file for EuroPoi?" },
      { label: "Find pluscode", q: "What is a pluscode and how do I find one?" },
      { label: "Import POIs",   q: "How do I import POIs into EuroPoi?" },
      { label: "Link audio",    q: "How do I link an mp3 file to a POI?" },
      { label: "Route vs track",q: "What is the difference between a route and a track in EuroPoi?" }
    ]
  },
  de: {
    welcome: "Hallo! Ich bin der EuroPoi-Assistent. Stelle mir Fragen zur Nutzung der App — zum Erstellen einer CSV-Datei, zum Importieren von POIs oder zur Audio-Einrichtung.",
    placeholder: "Stelle deine Frage...",
    sub: "Stelle deine Frage zur Nutzung von EuroPoi",
    sugs: [
      { label: "CSV erstellen",    q: "Wie erstelle ich eine CSV-Datei für EuroPoi?" },
      { label: "Pluscode finden",  q: "Was ist ein Pluscode und wie finde ich ihn?" },
      { label: "POIs importieren", q: "Wie importiere ich POIs in EuroPoi?" },
      { label: "Audio verknüpfen", q: "Wie verknüpfe ich eine mp3-Datei mit einem POI?" },
      { label: "Route vs Track",   q: "Was ist der Unterschied zwischen Route und Track in EuroPoi?" }
    ]
  },
  fr: {
    welcome: "Bonjour! Je suis l'assistant EuroPoi. Posez-moi des questions sur l'utilisation de l'app — comme la création d'un fichier CSV, l'import de POIs ou la configuration audio.",
    placeholder: "Posez votre question...",
    sub: "Posez votre question sur l'utilisation d'EuroPoi",
    sugs: [
      { label: "Créer CSV",       q: "Comment créer un fichier CSV pour EuroPoi?" },
      { label: "Trouver pluscode",q: "Qu'est-ce qu'un pluscode et comment le trouver?" },
      { label: "Importer POIs",   q: "Comment importer des POIs dans EuroPoi?" },
      { label: "Lier audio",      q: "Comment lier un fichier mp3 à un POI?" },
      { label: "Route vs trace",  q: "Quelle est la différence entre route et trace dans EuroPoi?" }
    ]
  },
  es: {
    welcome: "¡Hola! Soy el asistente de EuroPoi. Hazme preguntas sobre el uso de la app — como crear un archivo CSV, importar POIs o configurar el audio.",
    placeholder: "Haz tu pregunta...",
    sub: "Haz tu pregunta sobre el uso de EuroPoi",
    sugs: [
      { label: "Crear CSV",       q: "¿Cómo creo un archivo CSV para EuroPoi?" },
      { label: "Buscar pluscode", q: "¿Qué es un pluscode y cómo lo encuentro?" },
      { label: "Importar POIs",   q: "¿Cómo importo POIs en EuroPoi?" },
      { label: "Vincular audio",  q: "¿Cómo vinculo un mp3 a un POI en EuroPoi?" },
      { label: "Ruta vs track",   q: "¿Cuál es la diferencia entre ruta y track en EuroPoi?" }
    ]
  },
  it: {
    welcome: "Ciao! Sono l'assistente EuroPoi. Fai domande sull'uso dell'app — come creare un file CSV, importare POI o configurare l'audio.",
    placeholder: "Fai la tua domanda...",
    sub: "Fai la tua domanda sull'uso di EuroPoi",
    sugs: [
      { label: "Creare CSV",       q: "Come creo un file CSV per EuroPoi?" },
      { label: "Trovare pluscode", q: "Cos'è un pluscode e come lo trovo?" },
      { label: "Importare POI",    q: "Come importo POI in EuroPoi?" },
      { label: "Collegare audio",  q: "Come collego un mp3 a un POI in EuroPoi?" },
      { label: "Rotta vs track",   q: "Qual è la differenza tra rotta e track in EuroPoi?" }
    ]
  }
};

let history = [];
let currentLang = "nl";
let busy = false;

const messagesEl = document.getElementById("messages");
const inputEl    = document.getElementById("user-input");
const sendBtn    = document.getElementById("send-btn");
const sugsEl     = document.getElementById("sugs");
const headerSub  = document.getElementById("header-sub");

function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function addMsg(role, text) {
  const wrap   = document.createElement("div");
  wrap.className = "msg " + (role === "user" ? "user" : "bot");
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  if (role === "bot" && text === null) {
    bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  } else {
    bubble.textContent = text;
  }
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollBottom();
  return bubble;
}

function setLang(lang) {
  currentLang = lang;
  const d = LANG_DATA[lang];
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  headerSub.textContent = d.sub;
  inputEl.placeholder   = d.placeholder;
  renderSugs(lang);
}

function renderSugs(lang) {
  sugsEl.innerHTML = "";
  LANG_DATA[lang].sugs.forEach(s => {
    const btn = document.createElement("button");
    btn.className   = "sug";
    btn.textContent = s.label;
    btn.onclick     = () => { if (!busy) sendMessage(s.q); };
    sugsEl.appendChild(btn);
  });
}

document.querySelectorAll(".lang-btn").forEach(btn => {
  btn.addEventListener("click", () => setLang(btn.dataset.lang));
});

async function sendMessage(text) {
  if (!text.trim() || busy) return;
  busy = true;
  sendBtn.disabled = true;
  inputEl.value = "";
  inputEl.style.height = "40px";

  addMsg("user", text);
  history.push({ role: "user", content: text });

  const loadingBubble = addMsg("bot", null);

  try {
    const langNames = { nl:"Nederlands", en:"English", de:"Deutsch", fr:"Français", es:"Español", it:"Italiano" };
    const langNote  = `\n\n[Antwoord in het ${langNames[currentLang] || "Nederlands"}]`;

    const messages = [
      ...history.slice(0, -1),
      { role: "user", content: text + langNote }
    ];

    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM,
        messages
      })
    });

    const data   = await resp.json();
    const answer = data.content?.[0]?.text || LANG_DATA[currentLang]?.error || "Er ging iets mis. Probeer het opnieuw.";

    loadingBubble.innerHTML = "";
    loadingBubble.textContent = answer;
    history.push({ role: "assistant", content: answer });
    if (history.length > 24) history = history.slice(-24);

  } catch {
    loadingBubble.innerHTML = "";
    loadingBubble.textContent = "Verbindingsfout. Controleer je internetverbinding en probeer opnieuw.";
  }

  busy = false;
  sendBtn.disabled = false;
  scrollBottom();
}

sendBtn.addEventListener("click", () => sendMessage(inputEl.value));
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
});
inputEl.addEventListener("input", () => {
  sendBtn.disabled = !inputEl.value.trim() || busy;
});

setLang("nl");
addMsg("bot", LANG_DATA.nl.welcome);
</script>
</body>
</html>
